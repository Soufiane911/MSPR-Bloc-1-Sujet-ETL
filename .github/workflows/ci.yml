name: CI - Tests et Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest flake8 black
        pip install -r etl/requirements.txt
        pip install -r api/requirements.txt
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.git,__pycache__,data,logs
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics --exclude=.git,__pycache__,data,logs
    
    - name: Check code formatting with black
      run: |
        black --check --diff . --exclude='data|logs|__pycache__' || true
    
    - name: Test ETL
      run: |
        cd etl
        python -m pytest tests/ -v --tb=short || true
    
    - name: Test API
      run: |
        cd api
        python -m pytest tests/ -v --tb=short || true

  docker-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build ETL image
      run: |
        docker build -t obrail-etl ./etl
    
    - name: Build API image
      run: |
        docker build -t obrail-api ./api
    
    - name: Build Dashboard image
      run: |
        docker build -t obrail-dashboard ./dashboard
    
    - name: Validate docker-compose
      run: |
        docker-compose config
