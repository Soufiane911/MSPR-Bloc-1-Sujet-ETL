name: CI - Tests et Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Job 1 : Tests Python ────────────────────────────────────────────────
  test:
    name: Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flake8
          pip install -r etl/requirements.txt
          pip install -r api/requirements.txt

      - name: Lint — erreurs critiques (syntaxe, noms non définis)
        run: |
          flake8 etl/ api/ \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics

      - name: Lint — avertissements style (non bloquant)
        run: |
          flake8 etl/ api/ \
            --count --exit-zero \
            --max-complexity=10 --max-line-length=100 \
            --statistics

      - name: Tests ETL
        run: |
          cd etl
          python -m pytest tests/ -v --tb=short

      - name: Tests API
        run: |
          cd api
          python -m pytest tests/ -v --tb=short

  # ─── Job 2 : Build Docker ────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ETL image
        run: docker build -t obrail-etl ./etl

      - name: Build API image
        run: docker build -t obrail-api ./api

      - name: Build Dashboard image
        run: docker build -t obrail-dashboard ./dashboard

      - name: Validate docker-compose syntax
        env:
          POSTGRES_PASSWORD: ci_placeholder
          DATABASE_URL: postgresql://obrail:ci_placeholder@localhost:5432/obrail_db
        run: docker compose config --quiet
