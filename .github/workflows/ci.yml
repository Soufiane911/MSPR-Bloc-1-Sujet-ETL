name: CI - Tests et Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Passe toutes les actions sur Node.js 24 (Node 20 sera supprimé le 02/06/2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Job 1 : Lint Python ────────────────────────────────────────────────
  lint:
    name: Lint (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r etl/requirements.txt
          pip install -r api/requirements.txt

      - name: Lint — erreurs critiques (syntaxe, noms non définis)
        run: |
          flake8 etl/ api/ \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics

      - name: Lint — avertissements style (non bloquant)
        run: |
          flake8 etl/ api/ tests/ \
            --count --exit-zero \
            --max-complexity=10 --max-line-length=100 \
            --statistics

  # ─── Job 2 : Tests Python ────────────────────────────────────────────────
  tests:
    name: Tests - ${{ matrix.test_file }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_file:
          - tests/test_api_endpoints.py
          - tests/test_data_validation.py
          - tests/test_etl_pipeline.py
          - tests/test_data_merger.py
          - tests/test_example.py
    env:
      DATABASE_URL: "sqlite:///:memory:"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r etl/requirements.txt
          pip install -r api/requirements.txt

          # requirements-test.txt peut contenir un pin FastAPI incompatible
          # avec api/requirements.txt. On garde le pin runtime API en priorité.
          if [ -f requirements-test.txt ]; then
            grep -Ev '^fastapi==' requirements-test.txt > /tmp/requirements-test.filtered.txt
            pip install -r /tmp/requirements-test.filtered.txt
          fi

      - name: Run tests
        run: |
          python -m pytest ${{ matrix.test_file }} -v --tb=short

  # ─── Job 3 : Build Docker ────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ETL image
        run: docker build -t obrail-etl ./etl

      - name: Build API image
        run: docker build -t obrail-api ./api

      - name: Build Dashboard image
        run: docker build -t obrail-dashboard ./dashboard

      - name: Validate docker-compose syntax
        env:
          POSTGRES_PASSWORD: ci_placeholder
          DATABASE_URL: postgresql://obrail:ci_placeholder@localhost:5432/obrail_db
        run: docker compose config --quiet
