# .github/workflows/python-tests.yml
name: Python Tests

on:
  push:
    branches: [ main, Try#2test, develop ]
  pull_request:
    branches: [ main, Try#2test, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Upgrade pip and build tools
      run: |
        python -m pip install --upgrade pip setuptools wheel

    - name: Install test dependencies
      run: |
        if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi

    - name: Install API and ETL dependencies
      run: |
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        if [ -f etl/requirements.txt ]; then pip install -r etl/requirements.txt; fi

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html --tb=short --junit-xml=test-results.xml
      continue-on-error: true

    - name: Test Results Summary
      if: always()
      run: |
        echo "## Test Results 📊" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        pytest tests/ -v --tb=no 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
        coverage report >> $GITHUB_STEP_SUMMARY 2>&1 || echo "Coverage data not available"

    - name: Publish Test Report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: 'Pytest Results'
        path: 'test-results.xml'
        reporter: 'java-junit'
        fail-on-error: false

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
