# .github/workflows/python-tests.yml
name: Python Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '*/10 8-18 * * 1-5'
    - cron: '0 3 * * *'
  push:
    branches: [ main, Try#2test, develop, monitoring ]
  pull_request:
    branches: [ main, Try#2test, develop ]
  workflow_dispatch:

jobs:
  all-tests-and-monitoring:
    name: Setup
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Upgrade pip and build tools
      run: |
        python -m pip install --upgrade pip setuptools wheel

    - name: Install dependencies
      run: |
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        if [ -f etl/requirements.txt ]; then pip install -r etl/requirements.txt; fi
        if [ -f requirements-test.txt ]; then
          grep -Ev '^fastapi==' requirements-test.txt > /tmp/requirements-test.filtered.txt
          pip install -r /tmp/requirements-test.filtered.txt
        fi

    - name: "Test: API Endpoints (17 tests)"
      run: pytest tests/test_api_endpoints.py -v --tb=short

    - name: "Test: Data Validation (25 tests)"
      run: pytest tests/test_data_validation.py -v --tb=short

    - name: "Test: ETL Pipeline (19 tests)"
      run: pytest tests/test_etl_pipeline.py -v --tb=short

    - name: "Test: Data Merger (18 tests)"
      run: pytest tests/test_data_merger.py -v --tb=short

    - name: "Test: Examples & Security (9 tests)"
      run: pytest tests/test_example.py -v --tb=short

    - name: Coverage Report
      run: |
        pytest tests/ --cov=. --cov-report=xml --cov-report=term

    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Start services with docker compose
      run: |
        docker compose up -d
        sleep 30

    - name: Application Health Checks
      run: |
        max_attempts=30
        attempt=1
        while [ $attempt -le $max_attempts ]; do
          if curl -f http://localhost:8000/health; then
            echo "API is healthy"
            break
          fi
          echo "Attempt $attempt of $max_attempts failed. Retrying..."
          sleep 2
          attempt=$((attempt + 1))
        done
        [ $attempt -le $max_attempts ]

        curl -f http://localhost:9090/-/healthy
        curl -f http://localhost:3000/api/health
        curl -f http://localhost:9187
        curl -s http://localhost:8000/metrics | head -20
        curl -s 'http://localhost:9090/api/v1/query?query=up' | jq '.'
        curl -s http://localhost:9187/metrics | grep pg_stat_activity_count

    - name: API Performance Testing
      run: |
        sudo apt-get update && sudo apt-get install -y apache2-utils
        ab -n 100 -c 10 http://localhost:8000/trains/ || true
        ab -n 100 -c 10 http://localhost:8000/stations/ || true
        ab -n 100 -c 10 http://localhost:8000/operators/ || true
        ab -n 100 -c 10 http://localhost:8000/schedules/ || true

        metrics=$(curl -s http://localhost:8000/metrics)
        echo "$metrics" | grep -q "http_requests_total"

    - name: Monitoring Stack Validation
      run: |
        docker run --rm -v $(pwd)/prometheus.yml:/prometheus.yml prom/prometheus:latest promtool check config /prometheus.yml
        for dashboard in grafana/provisioning/dashboards/*.json; do
          if [ -f "$dashboard" ]; then
            python3 -m json.tool "$dashboard" > /dev/null
            echo "OK $dashboard"
          fi
        done
        docker compose config --quiet

    - name: Upload health check report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: health-check-report
        path: ./logs/

    - name: Cleanup
      if: always()
      run: docker compose down -v