# .github/workflows/python-tests.yml
name: Python Tests

on:
  push:
    branches: [ main, Try#2test, develop ]
  pull_request:
    branches: [ main, Try#2test, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Upgrade pip and build tools
      run: |
        python -m pip install --upgrade pip setuptools wheel

    - name: Install test dependencies
      run: |
        if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi

    - name: Install API and ETL dependencies
      run: |
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        if [ -f etl/requirements.txt ]; then pip install -r etl/requirements.txt; fi

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=term --tb=short 2>&1 | tee test-output.txt

    - name: Parse and Display Test Results
      if: always()
      run: |
        python << 'EOF'
        import re
        
        # Read test output
        with open('test-output.txt', 'r') as f:
            content = f.read()
        
        # Extract test results
        test_lines = [line for line in content.split('\n') if '::' in line and ('PASSED' in line or 'FAILED' in line)]
        
        # Write to summary
        with open(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null'), 'a') as summary:
            summary.write('# 📋 Test Results\n\n')
            summary.write('| Test File | Test Name | Status |\n')
            summary.write('|-----------|-----------|--------|\n')
            
            for line in test_lines:
                match = re.search(r'(test_\w+\.py)::(\w+)::(\w+)\s+(PASSED|FAILED)', line)
                if match:
                    file, cls, method, status = match.groups()
                    icon = '✅' if status == 'PASSED' else '❌'
                    summary.write(f'| {file} | {cls}::{method} | {icon} {status} |\n')
            
            # Add summary stats
            passed = len([l for l in test_lines if 'PASSED' in l])
            failed = len([l for l in test_lines if 'FAILED' in l])
            summary.write(f'\n## Summary\n')
            summary.write(f'- ✅ **Passed:** {passed}\n')
            summary.write(f'- ❌ **Failed:** {failed}\n')
            summary.write(f'- 📊 **Total:** {passed + failed}\n')
            
            # Add coverage
            if 'Name' in content and 'Stmts' in content:
                summary.write(f'\n## 📊 Coverage\n')
                coverage_section = content[content.find('Name'):content.find('Name')+500]
                summary.write(f'```\n{coverage_section}\n```\n')
        
        import os
        EOF

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
