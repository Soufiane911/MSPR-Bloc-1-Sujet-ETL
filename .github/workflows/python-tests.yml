# .github/workflows/python-tests.yml
name: Python Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Run health checks every 10 minutes during business hours
    - cron: '*/10 8-18 * * 1-5'
    # Run once daily during off-hours
    - cron: '0 3 * * *'
  push:
    branches: [ main, Try#2test, develop, monitoring ]
  pull_request:
    branches: [ main, Try#2test, develop ]
  workflow_dispatch:

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Upgrade pip and build tools
      run: |
        python -m pip install --upgrade pip setuptools wheel

    - name: Install dependencies
      run: |
        if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        if [ -f etl/requirements.txt ]; then pip install -r etl/requirements.txt; fi

  test-api-endpoints:
    name: "Test: API Endpoints (17 tests)"
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        if [ -f etl/requirements.txt ]; then pip install -r etl/requirements.txt; fi
    
    - name: Run API endpoint tests
      run: pytest tests/test_api_endpoints.py -v --tb=short

  test-data-validation:
    name: "Test: Data Validation (25 tests)"
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        if [ -f etl/requirements.txt ]; then pip install -r etl/requirements.txt; fi
    
    - name: Run data validation tests
      run: pytest tests/test_data_validation.py -v --tb=short

  test-etl-pipeline:
    name: "Test: ETL Pipeline (19 tests)"
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        if [ -f etl/requirements.txt ]; then pip install -r etl/requirements.txt; fi
    
    - name: Run ETL pipeline tests
      run: pytest tests/test_etl_pipeline.py -v --tb=short

  test-data-merger:
    name: "Test: Data Merger (18 tests)"
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        if [ -f etl/requirements.txt ]; then pip install -r etl/requirements.txt; fi
    
    - name: Run data merger tests
      run: pytest tests/test_data_merger.py -v --tb=short

  test-examples:
    name: "Test: Examples & Security (9 tests)"
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        if [ -f etl/requirements.txt ]; then pip install -r etl/requirements.txt; fi
    
    - name: Run example and security tests
      run: pytest tests/test_example.py -v --tb=short

  coverage:
    name: "Coverage Report"
    runs-on: ubuntu-latest
    needs: [test-api-endpoints, test-data-validation, test-etl-pipeline, test-data-merger, test-examples]
    if: always()
    
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest-cov coverage  # Ensure coverage tools are installed
        if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        if [ -f etl/requirements.txt ]; then pip install -r etl/requirements.txt; fi
    
    - name: Generate coverage report
      run: |
        pytest tests/ --cov=. --cov-report=xml --cov-report=term
      continue-on-error: true

    - name: Upload to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      continue-on-error: true

  health-checks:
    name: Application Health Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Start services with docker-compose
        run: |
          docker-compose up -d
          sleep 30

      - name: Check API health
        run: |
          max_attempts=30
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -f http://localhost:8000/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "Attempt $attempt of $max_attempts failed. Retrying..."
            sleep 2
            attempt=$((attempt + 1))
          done
          echo "API health check failed"
          exit 1

      - name: Check Prometheus health
        run: |
          curl -f http://localhost:9090/-/healthy || exit 1
          echo "Prometheus is healthy"

      - name: Check Grafana health
        run: |
          curl -f http://localhost:3000/api/health || exit 1
          echo "Grafana is healthy"

      - name: Check database connectivity
        run: |
          curl -f http://localhost:9187 || exit 1
          echo "PostgreSQL exporter is responding"

      - name: Fetch API metrics
        run: |
          curl -s http://localhost:8000/metrics | head -20
          echo "Successfully retrieved metrics from API"

      - name: Fetch Prometheus metrics
        run: |
          curl -s 'http://localhost:9090/api/v1/query?query=up' | jq '.'
          echo "Successfully queried Prometheus"

      - name: Monitor database connections
        run: |
          curl -s http://localhost:9187/metrics | grep pg_stat_activity_count
          echo "Successfully retrieved PostgreSQL metrics"

      - name: Upload health check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-check-report
          path: ./logs/

      - name: Cleanup
        if: always()
        run: docker-compose down -v

  performance-tests:
    name: API Performance Testing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker-compose up -d
          sleep 30

      - name: Wait for API to be ready
        run: |
          until curl -f http://localhost:8000/health; do
            echo 'Waiting for API...'
            sleep 1
          done

      - name: Run load tests with Apache Bench
        run: |
          apt-get update && apt-get install -y apache2-utils
          # Test API endpoints
          ab -n 100 -c 10 http://localhost:8000/trains/ || true
          ab -n 100 -c 10 http://localhost:8000/stations/ || true
          ab -n 100 -c 10 http://localhost:8000/operators/ || true
          ab -n 100 -c 10 http://localhost:8000/schedules/ || true

      - name: Verify metrics are being collected
        run: |
          metrics=$(curl -s http://localhost:8000/metrics)
          if echo "$metrics" | grep -q "http_requests_total"; then
            echo "Metrics are being collected successfully"
          else
            echo "Error: No metrics collected"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker-compose down -v

  monitoring-stack-validation:
    name: Monitoring Stack Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate prometheus.yml
        run: |
          docker run --rm -v $(pwd)/prometheus.yml:/prometheus.yml prom/prometheus:latest promtool check config /prometheus.yml

      - name: Validate Grafana dashboards
        run: |
          for dashboard in grafana/provisioning/dashboards/*.json; do
            if [ -f "$dashboard" ]; then
              python3 -m json.tool "$dashboard" > /dev/null
              echo "✓ $dashboard is valid JSON"
            fi
          done

      - name: Lint docker-compose.yml
        run: |
          docker-compose config --quiet
          echo "docker-compose.yml is valid"

  notify-monitoring-status:
    name: Send Monitoring Status Notification
    needs: [health-checks, performance-tests, monitoring-stack-validation]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.health-checks.result }}" = "failure" ] || \
             [ "${{ needs.performance-tests.result }}" = "failure" ] || \
             [ "${{ needs.monitoring-stack-validation.result }}" = "failure" ]; then
            echo "⚠️ One or more monitoring jobs failed"
            exit 1
          else
            echo "✅ All monitoring jobs passed"
          fi