services:
  # Base de données PostgreSQL
  database:
    image: postgres:15-alpine
    container_name: obrail-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-obrail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-obrail_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-obrail} -d $${POSTGRES_DB:-obrail_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - obrail-network

  # API FastAPI
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: obrail-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - obrail-network

  # Dashboard Streamlit
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: obrail-dashboard
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8501:8501"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./dashboard:/app
      - ./etl:/etl
    command: streamlit run app/app.py --server.port 8501 --server.address 0.0.0.0
    networks:
      - obrail-network

  # Dashboard Dash une page
  dashboard_dash:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: obrail-dashboard-dash
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8050:8050"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./dashboard:/app
    command: python app/dash_app.py
    networks:
      - obrail-network

  # ETL (service ponctuel)
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: obrail-etl
    environment:
      DATABASE_URL: ${DATABASE_URL}
    mem_limit: 12g
    memswap_limit: 12g
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./etl:/app
      - ./data:/data
      - ./logs:/app/logs
    working_dir: /app
    profiles:
      - etl
    networks:
      - obrail-network

volumes:
  postgres_data:

networks:
  obrail-network:
    driver: bridge
