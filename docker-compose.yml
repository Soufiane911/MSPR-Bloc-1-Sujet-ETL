version: '3.8'

services:
  # Base de données PostgreSQL
  database:
    image: postgres:15-alpine
    container_name: obrail-db
    environment:
      POSTGRES_USER: obrail
      POSTGRES_PASSWORD: obrail_secure_password
      POSTGRES_DB: obrail_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/../schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obrail -d obrail_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - obrail-network

  # API FastAPI
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: obrail-api
    environment:
      DATABASE_URL: postgresql://obrail:obrail_secure_password@database:5432/obrail_db
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - obrail-network

  # Dashboard Streamlit
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: obrail-dashboard
    environment:
      DATABASE_URL: postgresql://obrail:obrail_secure_password@database:5432/obrail_db
    ports:
      - "8501:8501"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./dashboard:/app
    command: streamlit run app/main.py --server.port 8501 --server.address 0.0.0.0
    networks:
      - obrail-network

  # ETL (service ponctuel)
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: obrail-etl
    environment:
      DATABASE_URL: postgresql://obrail:obrail_secure_password@database:5432/obrail_db
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./etl:/app
      - ./data:/app/data
      - ./logs:/app/logs
    profiles:
      - etl
    networks:
      - obrail-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: obrail-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    depends_on:
      - postgres_exporter
      - cadvisor
    networks:
      - obrail-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Exporter for database metrics
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: obrail-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://obrail:obrail_secure_password@database:5432/obrail_db?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - obrail-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9187"]
      interval: 30s
      timeout: 10s
      retries: 3

  # cAdvisor for Docker container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: obrail-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - obrail-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: obrail-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_INSTALL_PLUGINS: grafana-worldmap-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - obrail-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Loki for log aggregation
  loki:
    image: grafana/loki:2.9.2
    container_name: obrail-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - obrail-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Promtail for shipping logs to Loki
  promtail:
    image: grafana/promtail:2.9.2
    container_name: obrail-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    depends_on:
      - loki
    networks:
      - obrail-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  obrail-network:
    driver: bridge
