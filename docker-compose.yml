version: '3.8'

services:
  # Base de données PostgreSQL
  database:
    image: postgres:15-alpine
    container_name: obrail-db
    environment:
      POSTGRES_USER: obrail
      POSTGRES_PASSWORD: obrail_secure_password
      POSTGRES_DB: obrail_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/../schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obrail -d obrail_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - obrail-network

  # API FastAPI
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: obrail-api
    environment:
      DATABASE_URL: postgresql://obrail:obrail_secure_password@database:5432/obrail_db
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - obrail-network

  # Dashboard Streamlit
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: obrail-dashboard
    environment:
      DATABASE_URL: postgresql://obrail:obrail_secure_password@database:5432/obrail_db
    ports:
      - "8501:8501"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./dashboard:/app
    command: streamlit run app/main.py --server.port 8501 --server.address 0.0.0.0
    networks:
      - obrail-network

  # ETL (service ponctuel)
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: obrail-etl
    environment:
      DATABASE_URL: postgresql://obrail:obrail_secure_password@database:5432/obrail_db
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./etl:/app
      - ./data:/app/data
      - ./logs:/app/logs
    profiles:
      - etl
    networks:
      - obrail-network

volumes:
  postgres_data:

networks:
  obrail-network:
    driver: bridge
