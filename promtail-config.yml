server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          stream:
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: obrail
          __path__: /var/lib/docker/containers/*/*-json.log

  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          host: obrail
          __path__: /var/log/*.log
